services:
  postgres:
    image: postgres:15-alpine
    container_name: takehome-postgres
    environment:
      POSTGRES_DB: takehome
      POSTGRES_USER: takehome
      POSTGRES_PASSWORD: takehome
    ports:
      - "5432:5432"
    volumes:
      - takehome-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U takehome"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  takehome-postgres-data:
