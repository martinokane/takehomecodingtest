spring.application.name=takehomecodingtest

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:takehome}
spring.datasource.username=${DB_USERNAME:takehome}
spring.datasource.password=${DB_PASSWORD:takehome}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

jwt.secret=${JWT_SECRET:mysecretkey01234567890123456789012345678901}
jwt.expiration=${JWT_EXPIRATION:3600000}

api.version=v1

logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} | %logger{36} | UserId: %X{userId:-system} | %msg%n
